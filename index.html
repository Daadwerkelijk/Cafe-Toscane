<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#110d07" />
  <meta name="description" content="Maansmaak — koffie bijhouder" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Espresso" />
  <title>Espresso Logboek</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #110d07;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #e8d5b0;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 18px;
      border-bottom: 1px solid #3a2a14;
      background: linear-gradient(135deg, #1a0f04 0%, #2a1a08 100%);
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .icon { font-size: 2.2rem; }
    .title { font-size: 1.5rem; font-weight: bold; color: #c8a96e; letter-spacing: 0.04em; }
    .subtitle { font-size: 0.75rem; color: #8a6840; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

    #status-text {
      font-size: 0.75rem; color: #8a6840; font-style: italic;
      letter-spacing: 0.06em; opacity: 0; transition: opacity 0.4s;
    }

    .add-btn {
      background: #c8a96e; color: #110d07; border: none; border-radius: 6px;
      padding: 10px 20px; font-family: Georgia, serif; font-size: 0.9rem;
      font-weight: bold; cursor: pointer; letter-spacing: 0.04em;
    }
    .add-btn:hover { opacity: 0.85; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      margin: 16px 24px; padding: 12px 18px;
      background: #2a1010; border: 1px solid #8a3030;
      border-radius: 8px; color: #e07060; font-size: 0.88rem; line-height: 1.5;
    }

    /* ── Form ── */
    #form-card {
      display: none;
      margin: 20px 24px;
      background: #1e1510;
      border: 1px solid #3a2a14;
      border-radius: 10px;
      padding: 20px;
    }
    .form-title { font-size: 1rem; color: #c8a96e; margin-bottom: 16px; font-weight: bold; letter-spacing: 0.04em; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.7rem; color: #8a6840; letter-spacing: 0.1em; text-transform: uppercase; }
    input[type="text"], input[type="date"] {
      background: #110d07; border: 1px solid #3a2a14; border-radius: 5px;
      color: #e8d5b0; padding: 8px 10px; font-family: Georgia, serif;
      font-size: 0.88rem; outline: none; width: 100%;
    }
    input:focus { border-color: #c8a96e; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(0.3); }
    .form-actions { display: flex; gap: 12px; margin-top: 18px; }
    .save-btn {
      background: #c8a96e; color: #110d07; border: none; border-radius: 6px;
      padding: 9px 22px; font-family: Georgia, serif; font-size: 0.9rem; font-weight: bold; cursor: pointer;
    }
    .save-btn:hover { opacity: 0.85; }
    .cancel-btn {
      background: transparent; color: #8a6840; border: 1px solid #3a2a14;
      border-radius: 6px; padding: 9px 18px; font-family: Georgia, serif; font-size: 0.9rem; cursor: pointer;
    }
    .cancel-btn:hover { opacity: 0.85; }

    /* ── Table ── */
    #loading { text-align: center; color: #8a6840; padding: 60px; font-size: 1rem; letter-spacing: 0.1em; }

    .table-wrapper {
      overflow-x: auto;
      margin: 20px 24px 0;
      border-radius: 10px;
      border: 1px solid #3a2a14;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    thead tr { background: #2a1a08; }
    th {
      color: #c8a96e; padding: 12px 13px; text-align: left;
      font-weight: normal; letter-spacing: 0.08em; font-size: 0.72rem;
      text-transform: uppercase; border-bottom: 1px solid #3a2a14; white-space: nowrap;
    }
    td { padding: 10px 13px; border-bottom: 1px solid #261c0e; vertical-align: top; color: #e8d5b0; line-height: 1.4; }
    tbody tr:nth-child(even) { background: #1e1510; }
    tbody tr:nth-child(odd)  { background: #1a1208; }
    tbody tr:hover td { background: rgba(200,169,110,0.05); }

    .score-badge {
      background: #3a2a08; border: 1px solid #c8a96e; color: #c8a96e;
      border-radius: 12px; padding: 2px 10px; font-size: 0.8rem; white-space: nowrap;
    }
    .origine-cell { font-weight: bold; color: #d4b87a; }
    .empty-cell { color: #4a3a24; }

    .actions { display: flex; gap: 6px; }
    .edit-btn, .del-btn {
      background: transparent; border: 1px solid #3a2a14;
      border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 0.88rem;
    }
    .edit-btn:hover, .del-btn:hover { border-color: #c8a96e; }

    .empty-row td { text-align: center; color: #555; font-style: italic; padding: 36px; }

    /* ── Footer ── */
    footer { text-align: center; color: #4a3a24; font-size: 0.75rem; margin-top: 22px; letter-spacing: 0.1em; }

    /* ── Toast ── */
    #toast {
      display: none;
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #c8a96e; color: #110d07; padding: 10px 24px; border-radius: 20px;
      font-family: Georgia, serif; font-size: 0.88rem; font-weight: bold;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000; white-space: nowrap;
      animation: fadeSlideUp 0.3s ease;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translate(-50%, 14px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    ::-webkit-scrollbar { height: 6px; width: 6px; background: #1a1208; }
    ::-webkit-scrollbar-thumb { background: #3a2a14; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="icon">☕</span>
    <div>
      <div class="title">Espresso Logboek</div>
      <div class="subtitle">Maansmaak — koffie bijhouder</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span id="status-text"></span>
    <button class="add-btn" onclick="openAdd()">+ Nieuwe sessie</button>
  </div>
</header>

<div id="error-banner"></div>

<div id="form-card">
  <div class="form-title" id="form-title">➕ Nieuwe koffiesessie</div>
  <div class="form-grid">
    <div class="form-field"><label>Datum</label><input type="date" id="f-datum" /></div>
    <div class="form-field"><label>Koffie / Origine</label><input type="text" id="f-origine" placeholder="bijv. Costa Rica" /></div>
    <div class="form-field"><label>Maalgraad</label><input type="text" id="f-maalgraad" placeholder="bijv. 14" /></div>
    <div class="form-field"><label>Gram gemalen</label><input type="text" id="f-gram_gemalen" placeholder="bijv. 18g" /></div>
    <div class="form-field"><label>Gram espresso</label><input type="text" id="f-gram_espresso" placeholder="bijv. 36g" /></div>
    <div class="form-field"><label>Looptijd (sec)</label><input type="text" id="f-looptijd" placeholder="bijv. 28" /></div>
    <div class="form-field"><label>Crème laag</label><input type="text" id="f-creme_laag" placeholder="bijv. dik / dun" /></div>
    <div class="form-field"><label>Score</label><input type="text" id="f-score" placeholder="bijv. 8.5" /></div>
    <div class="form-field"><label>Notities</label><input type="text" id="f-notities" placeholder="vrije notitie" /></div>
  </div>
  <div class="form-actions">
    <button class="save-btn" id="save-btn" onclick="handleSave()">Toevoegen</button>
    <button class="cancel-btn" onclick="cancelForm()">Annuleren</button>
  </div>
</div>

<div id="loading">Laden…</div>

<div class="table-wrapper" id="table-wrapper" style="display:none;">
  <table>
    <thead>
      <tr>
        <th style="min-width:110px">Datum</th>
        <th style="min-width:150px">Koffie / Origine</th>
        <th style="min-width:95px">Maalgraad</th>
        <th style="min-width:115px">Gram gemalen</th>
        <th style="min-width:115px">Gram espresso</th>
        <th style="min-width:115px">Looptijd (sec)</th>
        <th style="min-width:105px">Crème laag</th>
        <th style="min-width:85px">Score</th>
        <th style="min-width:200px">Notities</th>
        <th style="min-width:80px">Acties</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer id="footer"></footer>
<div id="toast"></div>

<script>
  // ── CONFIG — vul hier je eigen Supabase gegevens in ──────────────────────
  const SUPABASE_URL  = 'https://wvtvcfmdkyzuptnuawuy.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2dHZjZm1ka3l6dXB0bnVhd3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2ODQ1MzMsImV4cCI6MjA5NjI2MDUzM30.CjeDeMdy7n3V2w-vy7G3PnEY2nzwTEWZ4fGxfiiI-w0';
  // ─────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const fields = ['datum','origine','maalgraad','gram_gemalen','gram_espresso','looptijd','creme_laag','score','notities'];
  let editId = null;
  let toastTimer = null;

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'fadeSlideUp 0.3s ease';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.style.display = 'none', 2400);
  }

  // ── Status ────────────────────────────────────────────────────────────────
  function setStatus(msg, color) {
    const el = document.getElementById('status-text');
    el.textContent = msg;
    el.style.color = color || '#8a6840';
    el.style.opacity = msg ? '1' : '0';
  }

  // ── Load ──────────────────────────────────────────────────────────────────
  async function load() {
    const { data, error } = await db
      .from('espresso_sessies')
      .select('*')
      .order('datum', { ascending: false });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-wrapper').style.display = 'block';

    if (error) {
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('error-banner').textContent =
        '⚠️ Kan geen verbinding maken met Supabase. Controleer je SUPABASE_URL en SUPABASE_KEY in index.html.';
    } else {
      renderTable(data);
    }
  }

  // ── Render table ──────────────────────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="10">Nog geen sessies. Voeg je eerste koffie toe!</td></tr>';
      document.getElementById('footer').textContent = '0 sessies gelogd';
      return;
    }

    data.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row.datum || '<span class="empty-cell">—</span>'}</td>
        <td><span class="origine-cell">${row.origine || ''}</span></td>
        <td>${row.maalgraad || '<span class="empty-cell">—</span>'}</td>
        <td>${row.gram_gemalen || '<span class="empty-cell">—</span>'}</td>
        <td>${row.gram_espresso || '<span class="empty-cell">—</span>'}</td>
        <td>${row.looptijd || '<span class="empty-cell">—</span>'}</td>
        <td>${row.creme_laag || '<span class="empty-cell">—</span>'}</td>
        <td>${row.score ? `<span class="score-badge">${row.score}</span>` : '<span class="empty-cell">—</span>'}</td>
        <td>${row.notities || '<span class="empty-cell">—</span>'}</td>
        <td>
          <div class="actions">
            <button class="edit-btn" onclick="startEdit(${row.id})" title="Bewerken">✏️</button>
            <button class="del-btn"  onclick="handleDelete(${row.id})" title="Verwijderen">🗑️</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    const n = data.length;
    document.getElementById('footer').textContent = `${n} sessie${n !== 1 ? 's' : ''} gelogd`;
  }

  // ── Form helpers ──────────────────────────────────────────────────────────
  function openAdd() {
    editId = null;
    fields.forEach(f => {
      document.getElementById('f-' + f).value = f === 'datum'
        ? new Date().toISOString().slice(0, 10) : '';
    });
    document.getElementById('form-title').textContent = '➕ Nieuwe koffiesessie';
    document.getElementById('save-btn').textContent = 'Toevoegen';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('f-origine').focus();
  }

  function cancelForm() {
    document.getElementById('form-card').style.display = 'none';
    editId = null;
  }

  function getFormData() {
    const obj = {};
    fields.forEach(f => obj[f] = document.getElementById('f-' + f).value.trim());
    return obj;
  }

  // ── Add / Edit ────────────────────────────────────────────────────────────
  async function handleSave() {
    const data = getFormData();
    if (!data.origine) { document.getElementById('f-origine').focus(); return; }
    setStatus('opslaan…');

    if (editId) {
      const { error } = await db.from('espresso_sessies').update(data).eq('id', editId);
      if (error) { setStatus('❌ fout', '#e07060'); showToast('❌ Fout bij opslaan'); return; }
      showToast('Wijzigingen opgeslagen ✓');
    } else {
      const { error } = await db.from('espresso_sessies').insert([data]);
      if (error) { setStatus('❌ fout', '#e07060'); showToast('❌ Fout bij opslaan'); return; }
      showToast('Sessie toegevoegd ☕');
    }

    setStatus('✓ opgeslagen');
    setTimeout(() => setStatus(''), 2000);
    cancelForm();
    await load();
  }

  async function startEdit(id) {
    const { data, error } = await db.from('espresso_sessies').select('*').eq('id', id).single();
    if (error) { showToast('❌ Fout bij laden'); return; }
    editId = id;
    fields.forEach(f => document.getElementById('f-' + f).value = data[f] || '');
    document.getElementById('form-title').textContent = '✏️ Bewerken';
    document.getElementById('save-btn').textContent = 'Opslaan';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth' });
  }

  async function handleDelete(id) {
    if (!confirm('Sessie verwijderen?')) return;
    const { error } = await db.from('espresso_sessies').delete().eq('id', id);
    if (error) { showToast('❌ Fout bij verwijderen'); return; }
    showToast('Sessie verwijderd');
    await load();
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  load();
</script>

</body>
</html>
